name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: asia-northeast3
  GAR_LOCATION: asia-northeast3-docker.pkg.dev
  GAR_REPOSITORY: insurance-genai-agent
  SERVICE_NAME: insurance-genai-agent-api
  IMAGE_NAME: insurance-genai-agent-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Startup smoke test
        run: |
          python -c "import app.main"
          uvicorn app.main:app --host 127.0.0.1 --port 8080 > uvicorn.log 2>&1 &
          UVICORN_PID=$!
          trap 'kill $UVICORN_PID 2>/dev/null || true' EXIT
          rm -f /tmp/health.json
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/health > /tmp/health.json; then
              break
            fi
            if ! kill -0 "$UVICORN_PID" 2>/dev/null; then
              cat uvicorn.log
              exit 1
            fi
            sleep 1
          done
          test -f /tmp/health.json
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          kill "$UVICORN_PID"
          wait "$UVICORN_PID" || true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build image
        run: |
          docker build \
            -t "${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          docker push \
            "${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=2 \
            --concurrency=10 \
            --set-env-vars="ENVIRONMENT=prod"

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)'

      - name: Show recent revision logs on failure
        if: failure()
        run: |
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --limit=50 \
            --freshness=30m \
            --format='value(timestamp,textPayload,jsonPayload.message,jsonPayload.exception)'
